name: {{project_name.snakeCase()}}
description: A Flutter project with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # visual
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17

  # state management
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3
  injectable: ^2.5.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # navigation
  auto_route: ^10.0.1

  # networking
  dio: ^5.4.0
  retrofit: ^4.0.3

  # firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4

  # utils
  logger: ^2.5.0
  internet_connection_checker: ^1.0.0+1

dev_dependencies:
  # tests
  flutter_test:
    sdk: flutter
  mockingjay: ^1.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

  # lint
  very_good_analysis: ^7.0.0

  # generators
  freezed: ^3.0.4
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  retrofit_generator: ^8.0.6
  auto_route_generator: ^10.0.1
  flutter_gen_runner: ^5.10.0

flutter_gen:
  output: lib/core/gen/

  integrations:
    flutter_svg: true

  colors:
    inputs:
      - assets/color/colors.xml

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
